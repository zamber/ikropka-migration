# Site Settings
title: "IKROPKA — Pracownia Architektury Krajobrazu"
title_separator: "—"
subtitle: "Profesjonalne usługi dendrologiczne i projektowe"
name: "IKROPKA"
description: "Pracownia architektury krajobrazu we Wrocławiu. Oferujemy usługi dendrologiczne, projekty zagospodarowania terenu, projekty zieleni oraz nadzory realizacji."
url: "https://zamber.github.io"
baseurl: "/ikropka-migration"
repository: "zamber/ikropka-migration"
locale: "pl-PL"
lang: "pl"

# Site Author - IKROPKA Contact Info
author:
  name: "IKROPKA"
  avatar: "/assets/images/logo.png"
  bio: "Pracownia Architektury Krajobrazu"
  location: "Wrocław, Polska"
  email: "biuro@ikropka.eu"
  links:
    - label: "Tel: 600 181 389"
      icon: "fas fa-fw fa-phone"
      url: "tel:+48600181389"
    - label: "Tel: 662 670 776"
      icon: "fas fa-fw fa-phone"
      url: "tel:+48662670776"

# Theme Settings - Minimal Mistakes
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Reading Files
include:
  - _pages
  - .htaccess
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 20  # amount of posts to show per page
paginate_path: /blog/page:num/
timezone: Europe/Warsaw

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /kategorie/
tag_archive:
  type: liquid
  path: /tagi/

# HTML Compression (optional, uncomment for production)
# compress_html:
#   clippings: all
#   ignore:
#     envs: development

# Collections
collections:
  portfolio:
    output: true
    permalink: /portfolio/:slug/
  services:
    output: true
    permalink: /oferta/:slug/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: true
      show_date: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: false
      comments: false
      sidebar:
        nav: "portfolio"
  # _services
  - scope:
      path: ""
      type: services
    values:
      layout: single
      author_profile: false
      share: false
      comments: false
      sidebar:
        nav: "services"

# SEO Related (jekyll-seo-tag)
social:
  type: Organization
  name: IKROPKA Pracownia Architektury Krajobrazu
  links:
    - "https://ikropka.eu"

# Google Analytics (optional, add later)
# analytics:
#   provider: "google-gtag"
#   google:
#     tracking_id: "UA-XXXXXXX-X"
#     anonymize_ip: true

# Footer
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:biuro@ikropka.eu"
    - label: "Telefon"
      icon: "fas fa-fw fa-phone-square"
      url: "tel:+48600181389"
