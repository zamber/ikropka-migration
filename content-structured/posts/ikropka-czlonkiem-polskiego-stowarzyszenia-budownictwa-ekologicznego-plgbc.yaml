  - type: body
    content: |
      PLGBC jest wiodącą organizacją pozarządową, która od 2008 roku wspiera transformację polskiego budownictwa i urbanistyki w kierunku zrównoważonego rozwoju, neutralności klimatycznej i zdrowego środowiska życia dla wszystkich. Społeczność PLGBC to ponad 250 członków z różnych sektorów gospodarki. Stowarzyszenie stanowi część globalnej społeczności 85 organizacji green building councils skupionych w ramach World Green Building Council.

      Dołączenie Pracowni IKROPKA do Stowarzyszenia Budownictwa Ekologicznego to dla nas naturalny krok w rozwoju. Od lat łączymy unikalne kompetencje z zakresu projektowania, ekspertyz i nadzoru, tworząc przestrzenie odporne na wyzwania przyszłości. Nasza codzienna praca to przede wszystkim:

      - **Projektowanie krajobrazu, przestrzeni dla ludzi, przyrody w adaptację do zmian klimatu**, projekty pod certyfikacje ekologiczne, zgodne z przepisami polskimi i unijnymi w zakresie bioróżnorodności, retencji, zazieleniania miast, projekty przestrzeni osiedlowe, place zabaw i strefy dla mieszkańców, projekty przyrodnicze np. przeciwdziałania defragmentacji siedlisk przyrodniczych, projekty z zakresu dziedzictwa przyrodniczego i kulturowego – rewitalizacji i rewaloryzacji zabytkowych założeń przestrzennych, parkowych czy ogrodowych.
      - **Opracowania dendrologiczne i arborystyczne** – inwentaryzacje dendrologiczne, operaty dendrologiczne, gospodarka drzewostanem (zadrzewieniami), opinie i ekspertyzy drzew na najwyższym poziomie w kontekście najczęściej planu pielęgnacji, oceny ryzyka upadku, oceny bezpieczeństwa czy opinii w sprawach dotyczących wypadków z udziałem drzew.
      - **Nadzory dendrologiczne** oraz **nadzory nad realizacją terenów zieleni** – ochrona drzew istniejących na budowach, nadzór nad pielęgnacją drzew, nadzór nad przesadzaniem drzew, nadzór nad wycinkami drzew, a także odbiory materiału roślinnego, pracami dotyczącymi poprawy warunków siedliskowych, warunków glebowych, nadzór nad prawidłowym sadzeniem roślin itp.

  - type: conclusion
    content: |
      Cieszymy się, że jako część społeczności PLGBC – zrzeszającej liderów branży budowlanej i ekologicznej – będziemy wymieniać doświadczenia i wspólnie nadawać kierunek zmianom. Wierzymy, że ta współpraca przyniesie realne korzyści dla miejskiego środowiska i jakości życia nas wszystkich.

