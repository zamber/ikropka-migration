  - type: content
    heading: "Holistyczne podejście"
    content: |
      Pracownia Architektury Krajobrazu IKROPKA pomaga swoim Klientom w czynnościach formalnoprawnych związanych z uzyskaniem niezbędnych pozwołem w tym na wycinkę drzew. W oparciu o obowiązujące podstawy prawne, w przypadku Wrocławia Zarządzenie Nr 1217/19 Prezydenta Wrocławia z dnia 28 czerwca 2019 r. w sprawie ochrony drzew i rozwoju terenów zieleni Wrocławia opracowujemy dane dotyczące drzew celem wprowadzenia do Systemu Informacji Przestrzennej Wrocławia (SIP). Dużą wagę przykładamy do ochrony drzew w procesie inwestycyjnym przygotowując opracowania takie jak projekt ochrony drzew na placu budowy. Wspieramy zarządców nieruchomości oraz jednostki samorządowe, gminy (w tym placówki oświatowe) wykonując przeglądy drzewostanu pod kątem bezpieczeństwa dla ludzi i mienia. Prowadzimy także szkolenia poświęcone zagadnieniom dendrologicznym na każdym etapie realizowania inwestycji. Zapraszamy do współpracy!

