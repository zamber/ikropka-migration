sections:
  - type: intro
    content: |
      Wraz z rozwojem tkanki miejskiej i zwiększonym ruchem kołowym, historyczne aleje drzew zmagają się z postępującą degradacją siedlisk. Projekt przy al. Paderewskiego to bezkompromisowa odpowiedź na problem „betonozy”, nielegalnego parkowania i niszczenia systemów korzeniowych. Stanowi on wzorcowy przykład na to, jak mądra adaptacja do zmian klimatu może i powinna być realizowana w obrębie zabytkowego układu urbanistycznego. Głównym celem naszego opracowania było przywrócenie chłonności gruntu i stworzenie optymalnych warunków dla kilkudziesięciu cennych dębów i grabów.

  - type: description
    heading: "Opis projektu"
    content: |
      Projekt zagospodarowania zieleni jako obustronnej kompozycji wzdłuż pasa drogowego przy Al. Paderewskiego we Wrocławiu, na odcinku od Ronda Wrocławskich Olimpijczyków do ul. Mickiewicza. Zadanie obejmowało kompleksową rewaloryzację zabytkowej alei, mającą na celu poprawę warunków siedliskowych drzew oraz przywrócenie historycznego charakteru miejsca.

  - type: challenges
    heading: "Wyzwania"
    content: |
      Trudne uwarunkowania przestrzenne, w tym bliskość Stadionu Olimpijskiego generującego imprezy masowe, stworzyły liczne konflikty na linii miejska infrastruktura a drzewa. Pas zieleni wzdłuż drogi był dewastowany przez nielegalne parkowanie, a nieprzepuszczalne nawierzchnie bitumiczne wylano w bezpośrednim sąsiedztwie pni, dławiąc korzenie. Projektowanie w tak wrażliwej tkance wymagało ścisłej współpracy z wieloma organami. Całość rozwiązań projektowych została szczegółowo uzgodniona z Zarządem Zieleni Miejskiej (ZZM), Dolnośląskim Wojewódzkim Konserwatorem Zabytków (DWKZ), Zarządem Dróg i Utrzymania Miasta (ZDiUM) oraz WMM.

  - type: solution
    heading: "Rozwiązania"
    content: |
      Podstawą działań była inwentaryzacja 71 drzew oraz wnikliwa analiza wpływu otoczenia na ich zdrowie. Wyznaczono bezwzględne Strefy Ochrony Drzewa (SOD) oraz Strefy Bezwzględnej Ochrony (SBO). Opracowano precyzyjny plan dla wykonawców, zakładający m.in. deskowanie pni (z proekologicznym zaleceniem użycia materiałów z odzysku), osiatkowanie gałęzi oraz budowę dróg technologicznych w sposób minimalizujący kompresję gleby.

      Aby zapewnić drzewom przetrwanie w dobie ekstremalnych zjawisk pogodowych, zaplanowano rozszczelnienie ponad 1100 m² nawierzchni bitumicznych obciążających systemy korzeniowe. Wymiana zbitej, pobudowlanej gleby w strefach ochrony odbędzie się metodą całkowicie bezinwazyjną, przy użyciu sprężonego powietrza (technologia Air Spade), co uchroni delikatne korzenie włośnikowe przed uszkodzeniami mechanicznymi. Dodatkowo wprowadzono głęboką poprawę fizyko-chemiczną gleby: aplikację stymulujących kwasów humusowych na powierzchni blisko 2500 m² oraz organiczne ściółkowanie, kategorycznie odrzucając stosowanie sztucznych agrowłóknin.

      Uzupełnienie „wypadów” w historycznym szpalerze oparto na wieloszkółkowanym materiale w postaci dębów szypułkowych (Quercus robur). Zrezygnowano z tradycyjnego palikowania na rzecz podziemnych systemów kotwiących bryłę korzeniową. Taka metoda stymuluje młode drzewa do wytwarzania drewna reakcyjnego, gwarantując lepsze przystosowanie do wiatrów i chroniąc pnie przed otarciami. Projekt dopełnia specjalistyczny program cięć formujących masywnych krzewów jałowców na Rondzie Olimpijczyków, oparty na subtelnych technikach japońskiej sztuki ogrodniczej.

  - type: results
    heading: "Efekty"
    content: |
      Główne korzyści projektu:
      • Adaptacja do zmian klimatu: zwiększenie retencji wód opadowych i obniżenie temperatury miejskiej wyspy ciepła poprzez rozszczelnienie asfaltowych pasów przylegających do pni.
      • Ochrona i adaptacja zabytkowego drzewostanu (70 dojrzałych dębów i grabów) do zmieniających się warunków miejskich.
      • Zwiększenie retencji wód opadowych i obniżenie temperatury wyspy ciepła poprzez rozszczelnienie asfaltowych pasów przylegających do pni.
      • Pobudzenie regeneracji uszkodzonych korzeni dzięki zastosowaniu specjalistycznych kwasów humusowych i wymianie zanieczyszczonej gleby na urodzajną.
      • Eliminacja niszczącej presji komunikacyjnej (kompresji gleby) dzięki projektowanym fizycznym zabezpieczeniom z wykorzystaniem naturalnych drewnianych słupków.
      • Ciągłość historycznego krajobrazu wrocławskiego Sępolna zabezpieczona na kolejne dekady.

