  - type: description
    heading: "Czym jest operat dendrologiczny?"
    content: |
      Operat dendrologiczny czyli ekspertyza dendrologiczna z projektem gospodarki drzewostanem, wykonywana jest na podstawie aktualnej, szczegółowej inwentaryzacji dendrologicznej. Operat sporządzany jest w celu wydania zaleceń do dalszego postępowania z drzewami i krzewami znajdującymi się na terenie opracowania. W operacie każde z drzew i krzewów zostaje przyporządkowane do odpowiedniej kategorii: do zachowania, do pielęgnacji, do przesadzenia, do usunięcia, do ekspertyzy i inne. Operat wykonujemy na potrzeby realizacji nowej inwestycji wymagającej prowadzenia pielęgnacji na drzewostanie, wycinek lub przesadzeń. W przypadku planowania inwestycji w operacie wytypowane są drzewa i krzewy kolidujące z projektem i robotami budowlanymi oraz znajdują się wytyczne do sposobu prowadzenia prac w obrębie korzeni, pnia, korony (np. z użyciem technik linowych w koronie).

      Wykonujemy także operaty dendrologiczne i inwentaryzacje zgodnie z Zarządzeniem Prezydenta Wrocławia w sprawie ochrony drzew i rozwoju terenów zieleni Wrocławia z dnia 11 sierpnia 2016 r. Jesteśmy w stanie przygotować pełną dokumentację operatu dendrologicznego z analizą uniknięcia kolizji planowanej inwestycji z istniejącym drzewostanem, wraz z przygotowaniem w programie QGIS Desktop plików Shapefile z lokalizacją drzew i krzewów do SIP oraz poprawnie wprowadzonymi danymi opisowymi w wymaganej strukturze xls.

  - type: components
    heading: "Operat dendrologiczny składa się z dwóch części"
    items:
      - title: "Część opisowa"
        description: |
          Zawiera inwentaryzację dendrologiczną (nazwę gatunkową w języku polskim i łacińskim, szczegółowe pomiary dendrometryczne, stan sanitarny oraz indywidualny opis każdego z drzew i krzewów) oraz projekt gospodarki drzewostanem z przyporządkowaną do każdej pozycji kategorią (do zachowania, do pielęgnacji, do przesadzenia, do usunięcia, zalecana ekspertyza dendrologiczna i inne) i szczegółowymi zaleceniami pielęgnacyjnymi.
      - title: "Część graficzna"
        description: |
          Wykonana w oprogramowaniu AutoCAD lub GIS, przedstawia podczytany projekt zagospodarowania terenu, lokalizację drzew i krzewów na mapie wraz z oznaczeniem numerycznym odpowiadającym zestawieniu tabelarycznemu w części opisowej oraz oznaczenie kategorii dla każdego z drzew/krzewów według projektu gospodarki drzewostanem.

