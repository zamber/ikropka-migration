  - type: description
    heading: "Opis projektu"
    content: |
      W koncepcji projektowej wyznaczono kilka stref funkcjonalnych. Strefa komunikacyjna znajduje się po wschodniej i zachodniej stronie budynku. Łączy część wejściową z tarasem oraz zapewnia dojście z garażu, przez strefę gospodarczą, do tarasu. Strefa gospodarcza znajduje się we wschodniej części działki.

      Jedno drzewo przeznaczono do usunięcia ze względu na zbyt duże zagęszczenie nasadzeń. Pozostałe istniejące drzewa zostały zachowane.

      Strefy zabaw dla dzieci zajmują dużą część ogrodu, ponieważ to one będą głównymi jego użytkownikami. Strefa biernych zabaw dla dzieci znajduje się na południe od tarasu. Wydzielona jest poprzez inny rodzaj nawierzchni oraz niewielkie krzewy, bezpieczne i przyjazne dla dzieci. Od strony południowej strefa ta jest zamknięta wzniesieniem, w którym umieszczono tunel. Strefa czynnych zabaw dla dzieci znajduje się w południowej części ogrodu. Należy do niej istniejąca górka saneczkowa, a planowo oddzielają ją od reszty ogrodu dwa łagodne, trawiaste pagórki. We wnętrzu tworzonym przez wzniesienia umieszczono trampolinę.

      Pomiędzy strefą bierną a czynną proponuje się umiejscowić atrakcyjne elementy zabawowe np. tunel wierzbowy lub ścieżkę bosych stóp.

      Strefa wypoczynku znajduje się we wschodniej części ogrodu, przeznaczona jest głównie dla dorosłych użytkowników. Jest to zacienione miejsce, w którym można zrelaksować się na leżaku lub hamaku.

      Miejsce na ogród warzywny znajduje się w zachodniej części ogrodu. Wejście znajduje się od strony południowej, dzięki czemu od strony wejścia do domu widać jedynie pagórek. We wschodnią skarpę piwniczki wkomponowano wnękę z blatem do przygotowywania posiłków. Obok znajduje się miejsce na grilla połączone funkcjonalnie z tarasem. Do tarasu przylega rabata z ziół przyprawowych.

      Przy tarasie zaplanowano nasadzenie pnączy na trejażu. Celem tego zabiegu jest osłonięcie tarasu przed okiem przyszłych sąsiadów oraz wzbogacenie walorów estetyczno-wizualnych tej części ogrodu. W północno-zachodniej części działki, przy ogrodzeniu, zaplanowano rabatę osłaniającą wnętrze ogrodu. Do istniejących nasadzeń dokomponowano nowe gatunki krzewów i bylin w naturalistycznym stylu.

