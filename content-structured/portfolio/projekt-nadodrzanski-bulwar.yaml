sections:
  - type: intro
    content: |
      Projekt zieleni przy kompleksie Profit Plaza ma, zgodnie z założeniami Miejscowego Planu Zagospodarowania Przestrzennego, charakter bulwaru spacerowo – widokowego w formie promenady nadrzecznej. Wytyczne MPZP narzucają zaprojektowanie ciągu pieszo – rowerowego, co spełniono wyznaczając jako główną funkcję właśnie komunikację.

  - type: description
    heading: "Opis projektu"
    content: |
      Stosunkowo wąski pas terenu, przeznaczony na promenadę, w pozostałej części zagospodarowano zielenią wysoką i niską oraz małą architekturą. Przy projekcie wzięto pod uwagę istniejącą zieleń wysoką, którą wcześniej zinwentaryzowano.

      Wzdłuż promenady zasadzono jednogatunkową aleję nasadzoną w podwójnym ciągu systemów donic – ławek obsadzonych poza tym roślinnością niską. W skład gatunkowy alei wchodzą: świetnie komponujący się z jasną elewacją projektowanego budynku klon czerwony, kostrzewa Gautiera tworząca efektowne, miękkie poduchy, atrakcyjna w połączeniu z fakturą drewnianej ławki oraz żurawka drobnokwiatowa w krwistej odmianie ‘Palace Purple’ nawiązująca do klonów.

      Ciąg bulwaru zakończono rzeźbą w otoczeniu jaśminowców umieszczoną na głównej osi widokowej bulwaru i drugiej alei prowadzącej w stronę ul. Kurkowej. Drugą aleję obsadzono klonami w formie kulistej, a zamiast trawnika użyto żurawki drobnokwiatowej.

      Użycie barw kontrastujących i dopełniających (czerwień – zieleń) w odpowiednich proporcjach pozwala na różnorodność, tym bardziej, że użyta w projekcie roślinność posiada wiele walorów: przebarwia się na jesień (klony czerwone, winobluszcze), jest zimozielona (laurowiśnie i kostrzewy Gautiera), ma atrakcyjny zapach (jaśminowce wonne otaczające rzeźbę), co niewątpliwie stanowi dodatkową atrakcję tego obszaru.

      Przy ciągach pieszo – rowerowych, aby nie zadusić korzeni drzew, konieczne jest użycie nawierzchni przepuszczalnej. Idealnym rozwiązaniem w tego typu przypadku jest nawierzchnia przepuszczalna typu Terraway, która pozytywnie oddziałuje na ogólną kondycję, stan zdrowotny i żywotność drzew. Dodatkowym atutem zastosowania tej nawierzchni jest fakt, że uniemożliwia ona zarastanie – jest odporna na kiełkowanie nasion traw i chwastów. Dla istniejącego drzewa o nr inwentaryzacyjnym 22 zaprojektowano okratowanie strefy przykorzennej dookoła pnia celem umożliwienia swobodnej cyrkulacji w zmienionych warunkach po przeprowadzonej inwestycji.

