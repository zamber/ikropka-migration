sections:
  - type: intro
    content: |
      Zagospodarowaniu został poddany niewielki ogród (92 m²) mieszczący się na tyłach domu. Dotychczas ogród nie był poddawany zabiegom pielęgnacyjnym. Jedynymi roślinami, znajdującymi się w tej części działki były dwa stosunkowo młode drzewa.

      Według oczekiwań inwestora, ogród miał pełnić funkcje głównie rekreacyjne i ozdobne – w tym celu również powstał projekt tarasu ogrodowego, będącego niejako „sceną” do podziwiania ogrodu. Życzeniem było również wydzielenie niewielkiej przestrzeni gospodarczej co zostało uwzględnione w postaci placyku z utwardzoną nawierzchnią przy schodach tarasowych.

  - type: description
    heading: "Projekt ogrodu"
    content: |
      W części ozdobnej ogrodu zdecydowano się na zminimalizowanie powierzchni utwardzonych, kosztem maksymalizacji części biologicznie czynnych – w postaci darni oraz projektowanej roślinności. Dzięki temu zabiegowi teren zyskał jasny podział na przestrzeń rekreacyjną i gospodarczą. Część rekreacyjna dzieli się na wypoczynkową, której funkcję pełni taras oraz ozdobną jaką pełni reszta ogrodu.

      Ponieważ teren opracowania jest stosunkowo mały, zdecydowano się na zastosowanie niewielu gatunków, aby uniknąć wprowadzenia zbędnego chaosu. Ogród ozdobny zaprojektowano w formie wygiętego łuku, zaakcentowanego rabatami obwódkowymi, który stanowi granicę trawnika oraz nasadzeń roślin. Bezpośrednio pod drzewami, z powodu sporego zacienienia, w trawniku obserwowano znaczne ubytki. W celu uniknięcia tego problemu w przyszłości, w jego miejscu zaplanowano byliny okrywowe, które z wiekiem będą się zagęszczać i bujnie zadarniać przestrzenie trudne do dotarcia kosiarką. Elementy roślinne ogrodu zostały „przeplecione” niewielkimi powierzchniami żwirowymi. Została zastosowana tu zasada wieloplanowości. Pomimo małych gabarytów przestrzeni objętej projektem, starano się ją jak najbardziej urozmaicić. Niemal każdy element jest tu tłem dla kolejnego – stwarza to ciekawą kompozycję, atrakcyjną do oglądania z tarasu oraz okien domu.

  - type: solution
    heading: "Rozwiązania"
    content: |
      Życzeniem inwestora było umiejscowienie choćby najmniejszego elementu wodnego na terenie posesji – co spełniono w postaci mini fontanny – „mokrego kamienia”.

  - type: results
    heading: "Efekt"
    content: |
      Projekt został zrealizowany.

