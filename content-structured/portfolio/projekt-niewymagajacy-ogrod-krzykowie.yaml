sections:
  - type: intro
    content: |
      Projekt ogrodu przydomowego o powierzchni ok. 1400 m² w podwrocławskiej miejscowości Krzyków zgodnie z wymogami inwestora przewiduje zagospodarowanie w sposób, który zapewnia jak najmniejsze nakłady pracy przy późniejszej pielęgnacji. Jednocześnie nie jest monotonny i nie ogranicza się wyłącznie do zastosowania roślinności iglastej zimozielonej.

  - type: description
    heading: "Opis projektu"
    content: |
      To ogród do użytkowania rekreacyjnego przez starsze małżeństwo, tradycyjny w formie, docelowo łatwy w utrzymaniu.

      W projekcie zastosowano głównie drzewa i krzewy, a ich uzupełnienie stanowią rośliny okrywowe, krzewinki i byliny wielosezonowe. Zrezygnowano z roślin jednorocznych, czy dwuletnich, które wymagają więcej uwagi. Gatunki roślin dobrano w taki sposób, by ogród był atrakcyjny przez cały rok. Dzięki temu można obserwować zmienność podczas następujących po sobie porach roku. Zmieniają się barwy roślin, zapachy, zmienia się widok z okna i tarasu. Przy doborze roślin projektanci wzięli pod uwagę preferencje kolorystyczne Klientów oraz ich ulubione rośliny, do których z pewnych względów mają sentyment – są to róże, lawenda, ogniki szkarłatne czy brzozy. Dzięki temu ogród zyskał romantyczny charakter, podkreślony dodatkowo rabatami o delikatnych, łukowatych kształtach.

  - type: solution
    heading: "Rozwiązania"
    content: |
      Wszystkie sugestie klientów zostały wzięte pod uwagę w procesie projektowym. Ważna była zarówno kompozycja względem domu Inwestora, jak i działek sąsiadów. Szczególną uwagę przywiązywano do przyszłych widoków z okien domu – dlatego kompozycje roślinne przed oknami stanowią „ramy” dalszych perspektyw, budując plany atrakcyjne podczas chwil spędzanych wewnątrz domu. Północno-wschodni narożnik działki przeznaczono, zgodnie z wymogiem inwestora, na niewielki owalny taras z przeznaczeniem na miejsce do grillowania. Towarzyszy mu osłona w postaci pnączy na podporach wytyczająca intymny zakątek wolny od spojrzeń sąsiadów. Środkową partię południowej części ogrodu stanowi „wyspa” z wielopiętrową aranżacją roślinną. Jest to jednocześnie główna dominanta ogrodu, stanowiąca osłonę dla zbiornika na nieczystości ciekłe.

