sections:
  - type: intro
    content: |
      Przez lata teren między wrocławskim Poltegorem a Hotelem Wrocław był przedmiotem kolejnych koncepcji tzw. „Centrum Południowego”. Pozostawał natomiast terenem zieleni ze spontanicznie wyrosłą roślinnością niską i wysoką, uczęszczanym przez mieszkańców okolicy.

      W momencie wybudowania w miejscu Poltegoru wieżowca Sky Tower, południowa część skweru została zaadaptowana na plac budowy, a następnie parking. W kolejnych latach rozpoczęła się także budowa budynku wielorodzinnego w północno-zachodniej części działki.

  - type: description
    heading: "Opis projektu"
    content: |
      Tymczasem teren ten ma duży potencjał, jako duży zielony obszar w centrum miasta. Takie spostrzeżenie stało się przyczynkiem do powstania koncepcji wrocławskiego „Central Parku” – położonego w bliskiej odległości Rynku, na dużym osiedlu, dogodnie skomunikowanego z innymi częściami miasta. Teren znajduje się wzdłuż ruchliwej ulicy Powstańców Śląskich, która stanowi główną arterię miasta prowadzącą w kierunku północ-południe. Położony jest w połowie drogi między placem Kościuszki, a placem Powstańców Śląskich i mógłby stanowić ciekawą przeciwwagę dla dużego skalą wieżowca.

      Przestudiowanie głównych tras przemieszczania się ludzi oraz rozmieszczenie punktów docelowych, takich jak przystanki, pozwoliło na wypracowanie układu komunikacyjnego połączonego z pętlą spacerową dookoła całego parku. Założeniem było zróżnicowanie terenu – stąd liczne pagórki oraz podwyższenie terenu od strony wieżowca, które ma dodatkowo złagodzić strzelistą formę budynku. Podwyższenie służy także jako amfiteatr z miejscami do siedzenia oraz punkt widokowy, tworzący nowe perspektywy na okolicę. Pagórki pojawiają się także przy nowopowstałym budynku mieszkalnym, w strefie zabaw dla czworonogów oraz siłowni zewnętrznej oraz przy placu zabaw dla dzieci, gdzie wyniesienie terenu nad budynkiem gastronomicznym stanowi jednocześnie górkę saneczkową. Od strony Hotelu Wrocław oraz Sky Tower’a wykreowano reprezentacyjne strefy wejściowe. Całość parku okala pas wysokich drzew, które mają pełnić funkcję bariery akustycznej chroniącej przez hałasem ruchliwej ulicy. Dopełnienie stanowią pasmowe kompozycje bylinowe z przewagą traw ozdobnych. W centralnej części znajduje się polana rekreacyjna z charakterystyczną pętlą o funkcji ozdobnej i rekreacyjnej. Częścią pętli jest wspomniany pagórek o funkcji restauracyjnej, który może także służyć do zabaw. Jedną z części stanowi także wyniesiony ponad poziom terenu tor do jazdy na desce. Pozostały fragment uformowany jest z nasadzeń traw ozdobnych. Całość będzie widoczna z okien otaczających park budynków. Ponad to wewnątrz pętli znajduje się plac zabaw dla najmłodszych.

      Park stanowi atrakcyjny teren zieleni w centrum dużego miasta. Bliskość dużej ilości budynków wielorodzinnych sprawia, że w okolicy znajduje się wielu potencjalnych użytkowników. Różnorodność funkcji stanowi o jego dodatkowych atutach.

