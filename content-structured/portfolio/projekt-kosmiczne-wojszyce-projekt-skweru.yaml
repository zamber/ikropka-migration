sections:
  - type: intro
    content: |
      Kosmiczne Wojszyce powstały przez inspirację nazwą ulicy przy której położony jest skwer – ulicą Kosmiczną. Z dwóch koncepcji, to właśnie kosmiczna wizja została wybrana zarówno przez Liderkę projektu, jak i Zamawiającego.

      Projekt zagospodarowania terenu wraz z projektem nawierzchni, detali w postaci małej architektury, projektem zieleni oraz projektem graficznym tablicy informacyjnej powstał na zlecenie Zarządu Zieleni Miejskiej we Wrocławiu i jest realizowany w ramach Wrocławskiego Budżetu Obywatelskiego 2018.

      W Kosmicznych Wojszycach znajdują się liczne kosmiczne odniesienia. Całość kompozycji ma układ spiralny nawiązujący do Drogi Mlecznej. W centralnej części skweru umieszczono plac o nawierzchni świecącej nocą, w kształcie galaktyki. Dodatkowym atutem projektu jest zaprojektowany <strong>ogród deszczowy</strong>.

  - type: description
    heading: "Opis projektu"
    content: |
      Centralnym kosmicznym elementem zagospodarowania jest plac nazwany „Galaktyką”, jego nawierzchnia zawiera pigment <strong>świecący nocą</strong>! Tak samo nocą zaświecą ułożone z kamieni gwiazdozbiory Wielkiego i Małego Wozu oraz Filary Stworzenia – robiniowe kłody, pomalowane specjalną farbą!

      Aby zebrać deszczówkę z zaprojektowanego placu, tuż obok zaplanowano wykonanie ogrodu deszczowego. Zagłębienie zostanie wysypane odpowiednimi warstwami kruszywa i substratu glebowego, a na końcu obsadzone roślinami i wyłożone kamieniami. Dzięki takiemu rozwiązaniu, woda deszczowa nie będzie tworzyć kałuż, ani nie spłynie do kanalizacji deszczowej, a zostanie odprowadzona do pożytecznego wykorzystania przez rośliny.

      Aby jeszcze bardziej uatrakcyjnić Kosmiczne Wojszyce dla rodzin z dziećmi, zaprojektowano dwuodcinkową <strong>ścieżkę bosych stóp</strong> oraz <strong>tunel z żywej wierzby</strong>, a także dwa pagórki i kolejne elementy z drewnianych słupków i kłód robiniowych. Skwer zostanie również wyposażony w kosze na odpady oraz stojaki rowerowe.

      Dla Kosmicznych Wojszyc zaprojektowaliśmy <em>edukacyjną tablicę informacyjną</em>, która w ciekway i prosty sposób opowiada o kosmosie. Kosmiczny charakter zagospodarowania uspójnią naturalistyczne elementy małej architektury i materiały. Natomiast roślinność podkreśli kontrastowość kosmicznego krajobrazu. Zastosowano fioletowo-żółte kompozycje bylin i krzewów. Mimo niewielkiej przestrzeni, w projekcie udało się wkomponować nasadzenia drzew w kilku gatunkach.

      Prace projektowe objęły: wizję terenową, inwentaryzację dendrologiczną, analizy przedprojektowe, opracowanie dwóch koncepcji, konsultacje z Liderką i Zamawiającym, wykonanie koncepcji ostatecznej będącej syntezą wybranych rozwiązań, wykonanie projektu budowlanego oraz prace administracyjne związane z procedurą w Wydziale Architektury i Budownictwa, wykonanie projektu wykonawczego wraz ze specyfikacją techniczną, kosztorysami.

