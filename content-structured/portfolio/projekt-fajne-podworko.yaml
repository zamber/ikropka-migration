sections:
  - type: intro
    content: |
      Projekt zieleni we wnętrzu podwórzowym we Wrocławiu o powierzchni 7937 m².
      Zadaniem było stworzenie spójnej kompozycji zieleni scalającej całe podwórze,
      wzbogacającej przestrzeń mieszkańców i dostosowanej do trudnych warunków użytkowania.

  - type: description
    heading: "Opis projektu"
    content: |
      Założeniem projektowym było osiągnięcie spójnej zieleni o charakterze scalającym całe podwórko.
      Kompozycje zieleni odgrywają dużą rolę w widokach z okien mieszkańców, towarzyszą elementom
      architektonicznym oraz wyposażeniu terenu jak place zabaw, ławki, a także stanowią zieleń osłonową
      przy śmietnikach w podwórzu. W projekcie zaproponowano gatunki drzew i krzewów znacznie podnoszące
      walory estetyczne zaprojektowanej przestrzeni. Użyte gatunki to rośliny odporne na trudne warunki,
      jak np. zadeptywanie.

  - type: content
    heading: "Kompozycja roślinna"
    content: |
      Układ projektowanej roślinności koresponduje z układem funkcjonalnym terenu czy usytuowaniem
      miejsc postojowych. Gatunki takie jak miłorząb dwuklapowy (*Ginkgo biloba*) w sposób istotny
      wpływają na jakość szaty roślinnej wnętrza podwórzowego. Zieleń wysoka pełni tu także funkcję
      osłonową, np. szpaler jarzębów zasłania wiatę śmietnikową, znajdującą się w centralnej części terenu.
      Krzewy liściaste są uzupełnieniem kompozycji.

  - type: results
    heading: "Realizacja"
    content: |
      Nad realizacją sprawowaliśmy nadzór inwestorski.
      Projekt powstał na zlecenie biura architektonicznego Grupa projektowa Mieszko Mazurek KONCEPT.

