sections:
  - type: intro
    content: |
      Koncepcja ogrodu leśnego o charakterze naturalistycznym wpisującym się w krajobraz m.in. poprzez zachowanie istniejących drzew i runa.

      W ramach opracowania wykonano inwentaryzację dendrologiczną wraz z projektem gospodarki drzewostanem, w którym dużą część roślin istniejących przeznaczono do przesadzenia na terenie opracowania. Analizując charakter ogrodu i życzenia klienta zaprojektowano kompozycję otwarć widokowych – polan otulonych obszarami gęsto zadrzewionymi. Sporządzono projekt wykonawczy ścieżek i elementów małej architektury.

  - type: description
    heading: "Opis projektu"
    content: |
      Celem udostępnienia ogrodu dla niepełnosprawnego użytkownika poruszającego się na wózku inwalidzkim zaprojektowano dwie pętle spacerowe utwardzonych ścieżek, wzdłuż nich ogród zmysłów w podwyższonych donicach oraz w części użytkowej blat roboczy. Elementy te dostosowane są wysokością i konstrukcją do potrzeb osoby niepełnosprawnej.

      Część reprezentacyjna ogrodu znajduje się przed wejściem głównym do domu od strony zachodniej. Ograniczono się tu do kilku gatunków roślin posadzonych większymi skupinami, tworząc tym samym czytelną kompozycję. Zastosowano między innymi: różę okrywową, kosodrzewinę, lawendę i rozplenicę japońską. Wejście do domu flankowane jest krzewami hortensji ogrodowej.

      W części wypoczynkowej ogrodu zaprojektowano drewniany taras o nieregularnej formie wokół pnia drzewa. Rabaty bylinowe i donice ozdobne zostały dostosowane kształtem i formą do przebiegu głównej ścieżki.

      Część użytkowa ogrodu znajduje się po stronie wschodniej. Zachowano winogrono rosnące na trejażu przy budynku garażowym oraz część drzewek owocowych. W celu uprawy warzyw zaprojektowano podwyższone donice drewniane: dwie jako skrzynie oraz jedną dostosowaną do wózka inwalidzkiego z blatem roboczym. Donice usytuowane są na planie koła na nawierżchni żwirowej. W części reprezentacyjnej oraz wypoczynkowej ogrodu przewidziano kilka punktów oświetleniowych, których światło podkreśli piękno ogrodu po zmroku.

